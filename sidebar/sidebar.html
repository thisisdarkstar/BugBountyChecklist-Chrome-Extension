<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BountyChecklist</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="sidebar" id="sidebarRoot">
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <span>BountyChecklist</span>
      </div>
      <div class="header-actions">
        <div class="font-controls">
          <button id="fontSm" class="icon-btn small active" title="Small">S</button>
          <button id="fontMd" class="icon-btn small" title="Medium">M</button>
          <button id="fontLg" class="icon-btn small" title="Large">L</button>
        </div>
        <button id="themeBtn" class="icon-btn" title="Toggle Theme">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="search-bar">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search payloads...">
    </div>

    <div class="content">
      <div class="categories" id="categories"></div>
      <div class="main-panel" id="mainPanel">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🐛</div>
          <h2>Welcome to BountyChecklist</h2>
          <p>Select a category to get started</p>
          <div class="quick-tags" id="quickTags"></div>
        </div>
      </div>
    </div>

    <div class="quick-bar">
      <button id="headersBtn" class="quick-btn" title="Common Headers">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h10"/>
        </svg>
      </button>
      <button id="favsBtn" class="quick-btn" title="Favorites">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
      <button id="randomBtn" class="quick-btn" title="Random Payload">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="sidebar.js"></script>
</body>
</html>
